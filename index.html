<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyCompany — Field Service Management</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0d14;--surface:#131620;--card:#1a1d2e;--border:#252a3d;
  --text:#e8eaf0;--muted:#6b7094;--sub:#a0a4b8;
  --accent:#6c63ff;--teal:#4ecdc4;--orange:#ffa733;--red:#ff6b6b;--green:#4caf50;--yellow:#ffc107;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,textarea,button{font-family:'Sora',sans-serif;}
button{cursor:pointer;}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
#main{flex:1;overflow-y:auto;padding:28px 30px;}

/* Sidebar */
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sidebar-logo h1{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sidebar-logo p{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.nav-section{padding:12px 8px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:all .2s;margin:1px 6px;border:1px solid transparent;}
.nav-item:hover{background:#1e2235;color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,rgba(108,99,255,.2),rgba(78,205,196,.1));color:var(--accent);border-color:rgba(108,99,255,.25);}
.nav-item .icon{font-size:15px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700;}
.sidebar-user{margin-top:auto;padding:14px 12px;border-top:1px solid var(--border);}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.stat-card{background:linear-gradient(135deg,#1e2235,#252a3d);border:1px solid var(--border);border-radius:14px;padding:18px;}

/* Buttons */
.btn{padding:9px 18px;border-radius:8px;font-weight:600;font-size:12px;border:none;transition:all .2s;cursor:pointer;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--teal));color:#fff;}
.btn-primary:hover{opacity:.85;}
.btn-danger{background:linear-gradient(135deg,var(--red),#c0392b);color:#fff;}
.btn-success{background:linear-gradient(135deg,var(--green),#27ae60);color:#fff;}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--border);color:var(--text);}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:7px;}
.btn-xs{padding:3px 9px;font-size:10px;border-radius:6px;}

/* Forms */
.form-group{margin-bottom:14px;}
.label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px;}
.input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:8px;width:100%;font-size:13px;outline:none;transition:border-color .2s;}
.input:focus{border-color:var(--accent);}
select.input option{background:#1a1d2e;}
textarea.input{resize:vertical;min-height:80px;}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-green{background:rgba(76,175,80,.15);color:#4caf50;}
.badge-red{background:rgba(255,107,107,.15);color:var(--red);}
.badge-orange{background:rgba(255,167,51,.15);color:var(--orange);}
.badge-blue{background:rgba(108,99,255,.15);color:var(--accent);}
.badge-teal{background:rgba(78,205,196,.15);color:var(--teal);}
.badge-yellow{background:rgba(255,193,7,.15);color:var(--yellow);}
.badge-purple{background:rgba(156,39,176,.15);color:#ce93d8;}
.badge-gray{background:rgba(107,112,148,.15);color:var(--muted);}

/* Tables */
.table-wrap{overflow-x:auto;}
table.tbl{width:100%;border-collapse:collapse;font-size:12px;}
table.tbl th{padding:9px 14px;text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
table.tbl td{padding:11px 14px;border-bottom:1px solid #1e2235;color:var(--sub);vertical-align:middle;}
table.tbl tr:hover td{background:rgba(255,255,255,.015);}

/* Grids */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

/* Page */
.page-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:3px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:22px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal h3{color:var(--text);margin-bottom:20px;font-size:17px;}

/* Progress */
.progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--teal));}

/* Toast */
#toast{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast-item{padding:13px 18px;border-radius:11px;font-size:12px;font-weight:600;min-width:260px;max-width:340px;animation:slideIn .3s ease;pointer-events:all;}
.toast-success{background:linear-gradient(135deg,#1a3028,#1e3830);border:1px solid var(--teal);color:var(--teal);}
.toast-error{background:linear-gradient(135deg,#30181a,#381e1e);border:1px solid var(--red);color:var(--red);}
.toast-info{background:linear-gradient(135deg,#1a1e30,#1e2238);border:1px solid var(--accent);color:var(--accent);}
@keyframes slideIn{from{transform:translateX(50px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* Login */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(108,99,255,.15) 0%,transparent 60%),var(--bg);}

/* Tab nav */
.tab-nav{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px;}
.tab-btn{flex:1;padding:8px;border:none;background:none;color:var(--muted);font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--teal));color:#fff;}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.kanban-col{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:12px;padding:14px;}
.kanban-col-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:10px;border-left:3px solid;}

/* Timeline */
.timeline{display:flex;flex-direction:column;}
.timeline-item{display:flex;gap:12px;margin-bottom:14px;}
.t-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;}
.t-line{width:2px;background:var(--border);margin:2px auto 0;}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
.empty .empty-icon{font-size:40px;margin-bottom:12px;display:block;}

/* Highlight */
.highlight{color:var(--text);font-weight:600;}
.amount-positive{color:var(--teal);font-weight:700;}
.amount-negative{color:var(--red);font-weight:600;}

/* Checkbox */
.check-label{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub);cursor:pointer;}
input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;}

/* Priority indicators */
.p-urgent{color:var(--red);}
.p-high{color:var(--orange);}
.p-medium{color:var(--yellow);}
.p-low{color:var(--teal);}

/* Responsive helpers */
@media(max-width:900px){
  .grid-4{grid-template-columns:1fr 1fr;}
  .grid-3{grid-template-columns:1fr 1fr;}
  .kanban{grid-template-columns:1fr;}
}

/* ===== MOBILE LAYOUT ===== */
@media(max-width:600px){
  /* Hide sidebar, show bottom nav */
  #sidebar{display:none !important;}
  #mobile-bottom-nav{display:flex !important;}
  #mobile-topbar{display:flex !important;}
  #app{flex-direction:column;}
  #main{padding:12px 12px 80px;width:100%;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .kanban{grid-template-columns:1fr;}
  .page-header{flex-direction:column;gap:10px;}
  .page-header .btn{width:100%;}
  .modal{width:95%;padding:20px;border-radius:16px;}
  table.tbl{font-size:11px;}
  table.tbl th,table.tbl td{padding:8px 10px;}
  .stat-card{padding:14px;}
  .card{padding:14px;}
  #wa-btn{bottom:76px;right:16px;width:44px;height:44px;font-size:20px;}
}

/* Mobile top bar */
#mobile-topbar{display:none;position:fixed;top:0;left:0;right:0;z-index:400;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;align-items:center;justify-content:space-between;height:56px;}
#mobile-topbar h2{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#mobile-topbar .mob-user{display:flex;align-items:center;gap:8px;}
#mobile-topbar .mob-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}

/* Mobile bottom nav */
#mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 8px;}
.mob-nav-items{display:flex;justify-content:space-around;align-items:center;}
.mob-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border-radius:10px;cursor:pointer;min-width:50px;border:none;background:none;}
.mob-nav-item .mn-icon{font-size:20px;}
.mob-nav-item .mn-label{font-size:9px;font-weight:600;color:var(--muted);}
.mob-nav-item.active .mn-label{color:var(--accent);}
.mob-nav-more{position:fixed;bottom:64px;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px;display:none;z-index:399;max-height:60vh;overflow-y:auto;}
.mob-nav-more.open{display:block;}
.mob-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mob-nav-grid-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:12px;cursor:pointer;background:var(--card);border:1px solid var(--border);}
.mob-nav-grid-item .mgi-icon{font-size:22px;}
.mob-nav-grid-item .mgi-label{font-size:9px;font-weight:600;color:var(--sub);text-align:center;}
.mob-nav-grid-item.active{background:rgba(108,99,255,.15);border-color:rgba(108,99,255,.3);}
.mob-nav-grid-item.active .mgi-label{color:var(--accent);}

/* Push content down on mobile for topbar */
@media(max-width:600px){
  #main{margin-top:56px;}
}

/* WhatsApp float */
#wa-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#25d366;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;z-index:500;box-shadow:0 4px 20px rgba(37,211,102,.4);cursor:pointer;transition:transform .2s;}
#wa-btn:hover{transform:scale(1.1);}

/* Mobile selfie modal improvements */
.selfie-video-wrap{position:relative;width:100%;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:3/4;}
.selfie-video-wrap video{width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>

<!-- Toast Container -->
<div id="toast"></div>

<!-- Login Screen -->
<div id="login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(108,99,255,.15) 0%,transparent 60%),var(--bg);">
  <!-- Rendered by showLoginScreen() / window.onload -->
</div>

<!-- Main App (hidden until login) -->
<div id="app" style="display:none;">

  <!-- Mobile Top Bar -->
  <div id="mobile-topbar">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:22px;">🏗️</span>
      <h2>MyCompany</h2>
    </div>
    <div class="mob-user">
      <div style="font-size:11px;color:var(--muted);text-align:right;" id="mob-role-label">Admin</div>
      <div class="mob-avatar" id="mob-avatar">?</div>
    </div>
  </div>

  <!-- Mobile Bottom Navigation -->
  <div id="mobile-bottom-nav">
    <div class="mob-nav-items">
      <button class="mob-nav-item active" id="mob-nav-dashboard" onclick="mobileNav('dashboard')">
        <span class="mn-icon">📊</span><span class="mn-label">Dashboard</span>
      </button>
      <button class="mob-nav-item" id="mob-nav-attendance" onclick="mobileNav('attendance')">
        <span class="mn-icon">✅</span><span class="mn-label">Attend</span>
      </button>
      <button class="mob-nav-item" id="mob-nav-tasks" onclick="mobileNav('tasks')">
        <span class="mn-icon">📋</span><span class="mn-label">Tasks</span>
      </button>
      <button class="mob-nav-item" id="mob-nav-leaves" onclick="mobileNav('leaves')">
        <span class="mn-icon">🏖️</span><span class="mn-label">Leaves</span>
      </button>
      <button class="mob-nav-item" onclick="toggleMobMore()">
        <span class="mn-icon">☰</span><span class="mn-label">More</span>
      </button>
    </div>
  </div>

  <!-- Mobile More Menu -->
  <div class="mob-nav-more" id="mob-more-menu">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-size:13px;font-weight:700;color:var(--text);">All Sections</span>
      <button class="btn btn-ghost btn-xs" onclick="logout()">🚪 Logout</button>
    </div>
    <div class="mob-nav-grid" id="mob-more-grid"></div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>MyCompany</h1>
      <p id="sb-company-name">Loading...</p>
    </div>
    <div id="nav-container"></div>
    <div class="sidebar-user">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div class="user-avatar" id="sb-avatar">?</div>
        <div style="overflow:hidden;">
          <div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="sb-name">User</div>
          <div style="font-size:10px;color:var(--muted);" id="sb-role">Role</div>
        </div>
      </div>
      <button class="btn btn-ghost" style="width:100%;font-size:11px;padding:7px;" onclick="logout()">🚪 Logout</button>
    </div>
  </div>
  <!-- Main Content -->
  <div id="main">
    <div id="page-content"></div>
  </div>
</div>

<!-- Modal Container -->
<div id="modal-bg" class="modal-bg" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<!-- WhatsApp Button -->
<button id="wa-btn" title="WhatsApp Reminders" onclick="showWAReminder()">💬</button>

<script>
// ============================================================
// STATE
// ============================================================
let DB = {
  superAdmin: { id: 'sa1', username: 'justclickfms@gmail.com', password: 'workdo' },
  companies: [],
  admins: [],
  users: [],
  sites: [],
  attendance: [],
  tasks: [],
  leaves: [],
  salaries: [],
  expenses: [],
  payments: [],
  reminders: [],
  locationLogs: [],
  documents: [],
  materials: [],
  qrSessions: []
};

let currentUser = null; // { role, id, companyId }
let currentPage = '';
let loginTab = 'admin';
let saClickCount = 0;

// ============================================================
// FIREBASE FIRESTORE — REST API (works on GitHub Pages, any host)
// ============================================================
const FS_PROJECT = "mycompany-ea0f6";
const FS_COLLECTION = "mycompany_data";
const FS_API_KEY = "AIzaSyDe6PVsL8cZ8I4cs9hTLGCbBX12wP4s7zM";
const FS_BASE = `https://firestore.googleapis.com/v1/projects/${FS_PROJECT}/databases/(default)/documents/${FS_COLLECTION}`;

let fsOnline = false;

async function initFirebase() {
  try {
    const r = await fetch(`${FS_BASE}/superAdmin?key=${FS_API_KEY}`);
    fsOnline = (r.ok || r.status === 404);
    if (fsOnline) toast('☁️ Firestore connected', 'info');
    else toast('⚠️ Firestore offline – using local storage', 'error');
  } catch(e) {
    fsOnline = false;
    toast('⚠️ No internet – using local storage', 'error');
  }
}

async function fsSet(docId, data) {
  if (!fsOnline) return;
  const url = `${FS_BASE}/${docId}?key=${FS_API_KEY}`;
  const body = { fields: {
    data: { stringValue: JSON.stringify(data) },
    ts:   { stringValue: new Date().toISOString() }
  }};
  const r = await fetch(url, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (!r.ok) { const e = await r.text(); throw new Error(r.status + ': ' + e); }
}

async function fsGet(docId) {
  if (!fsOnline) return null;
  const r = await fetch(`${FS_BASE}/${docId}?key=${FS_API_KEY}`);
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(r.status);
  const j = await r.json();
  return j.fields?.data?.stringValue ? JSON.parse(j.fields.data.stringValue) : null;
}

const FS_KEYS = ['companies','admins','users','sites','attendance','tasks','leaves',
                 'salaries','expenses','payments','reminders','locationLogs',
                 'documents','materials','qrSessions','superAdmin'];

async function saveToFirestore() {
  if (!fsOnline) return;
  try {
    await Promise.all(FS_KEYS.map(k => fsSet(k, k === 'superAdmin' ? DB.superAdmin : (DB[k]||[]))));
    console.log('✅ Firestore saved');
  } catch(e) { console.error('Firestore save error:', e.message); }
}

async function loadFromFirestore() {
  if (!fsOnline) return false;
  try {
    const vals = await Promise.all(FS_KEYS.map(k => fsGet(k)));
    let hasData = false;
    vals.forEach((v, i) => {
      if (v !== null) {
        hasData = true;
        if (FS_KEYS[i] === 'superAdmin') DB.superAdmin = v;
        else DB[FS_KEYS[i]] = v;
      }
    });
    console.log('✅ Firestore loaded, hasData:', hasData);
    return hasData;
  } catch(e) { console.error('Firestore load error:', e.message); return false; }
}

// Manual force-sync button (accessible from admin dashboard)
async function forceSyncToFirestore() {
  if (!fsOnline) { toast('Not connected to Firestore', 'error'); return; }
  toast('Syncing to Firestore...', 'info');
  try {
    await saveToFirestore();
    toast('✅ All data synced to Firestore!', 'success');
  } catch(e) { toast('Sync failed: ' + e.message, 'error'); }
}

// ============================================================
// PERSISTENCE (localStorage + Firestore)
// ============================================================
function saveDB() {
  try { localStorage.setItem('wfp_db', JSON.stringify(DB)); } catch(e) {}
  saveToFirestore(); // async, runs in background
}

async function loadDB() {
  // Load localStorage first (instant)
  try {
    const s = localStorage.getItem('wfp_db');
    if (s) DB = { ...DB, ...JSON.parse(s) };
  } catch(e) {}
  // Init Firestore and pull latest data
  await initFirebase();
  if (fsOnline) {
    const loaded = await loadFromFirestore();
    if (loaded) {
      try { localStorage.setItem('wfp_db', JSON.stringify(DB)); } catch(e) {}
    }
  }
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  const d = document.createElement('div');
  d.className = `toast-item toast-${type}`;
  d.innerHTML = `${type==='success'?'✓':type==='error'?'✗':'ℹ'} ${msg}`;
  t.appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

// ============================================================
// MODAL
// ============================================================
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-bg').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal-bg').style.display = 'none';
  document.getElementById('modal-content').innerHTML = '';
}

// ============================================================
// LOGIN
// ============================================================
function setLoginTab(tab) {
  loginTab = tab;
  document.querySelectorAll('#login-tabs .tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='admin')||(i===1&&tab==='user')));

let currentCamFacing = 'user';
let cameraStream = null;

function startSelfieCamera() {
  stopCamera();
  const constraints = { video: { facingMode: currentCamFacing, width: { ideal: 640 }, height: { ideal: 480 } }, audio: false };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(stream => {
      cameraStream = stream;
      const v = document.getElementById('selfie-video');
      const c = document.getElementById('selfie-canvas');
      v.srcObject = stream;
      v.style.display = 'block';
      if(c) c.style.display = 'none';
      document.getElementById('selfie-placeholder').style.display = 'none';
      document.getElementById('cam-open-btn').style.display = 'none';
      document.getElementById('cam-switch-btn').style.display = 'inline-flex';
      document.getElementById('cam-capture-btn').style.display = 'inline-flex';
    })
    .catch(err => {
      console.error('Camera error:', err);
      if(err.name === 'NotAllowedError') {
        toast('Camera permission denied. Please allow camera access in browser settings.', 'error');
      } else if(err.name === 'NotFoundError') {
        toast('No camera found on this device.', 'error');
      } else {
        toast('Camera unavailable: ' + err.message, 'error');
      }
    });
}

function switchCamera() {
  currentCamFacing = currentCamFacing === 'user' ? 'environment' : 'user';
  startSelfieCamera();
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
}

function captureSelfie(userId) {
  const v = document.getElementById('selfie-video');
  const c = document.getElementById('selfie-canvas');
  let selfieData = null;
  if (v && v.srcObject && v.readyState >= 2) {
    c.width = v.videoWidth || 320;
    c.height = v.videoHeight || 240;
    c.getContext('2d').drawImage(v, 0, 0);
    selfieData = c.toDataURL('image/jpeg', 0.5);
    c.style.display = 'block';
    v.style.display = 'none';
    stopCamera();
    const msg = document.getElementById('selfie-captured-msg');
    if(msg) msg.style.display = 'block';
  }
  finishLogin(userId, selfieData);
}

function skipSelfie(userId) { finishLogin(userId, null); }

function finishLogin(userId, selfieData) {
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0];
  const timeStr = now.toTimeString().slice(0,5);
  // Mark auto-attendance for today
  const existing = DB.attendance.find(a => a.userId === userId && a.date === dateStr);
  if (!existing) {
    const user = DB.users.find(u => u.id === userId);
    DB.attendance.push({
      id: 'att_' + uid(), companyId: user.companyId, userId, siteId: user.siteId || '',
      date: dateStr, loginTime: timeStr, logoutTime: null,
      status: 'present', selfie: selfieData, lat: 19.1136 + Math.random()*0.01, lng: 72.8697 + Math.random()*0.01
    });
    // Start location tracking
    startLocationTracking(userId);
    saveDB();
  }
  closeModal();
  enterApp();
}

function startLocationTracking(userId) {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      DB.locationLogs.push({
        userId, timestamp: new Date().toISOString(),
        lat: pos.coords.latitude, lng: pos.coords.longitude
      });
      saveDB();
    });
  }
}

function logout() {
  if (currentUser?.role === 'user') {
    const dateStr = new Date().toISOString().split('T')[0];
    const timeStr = new Date().toTimeString().slice(0,5);
    const att = DB.attendance.find(a => a.userId === currentUser.id && a.date === dateStr && !a.logoutTime);
    if (att) { att.logoutTime = timeStr; saveDB(); }
  }
  currentUser = null;
  try { sessionStorage.removeItem('mc_session'); } catch(e) {}
  document.getElementById('app').style.display = 'none';
  showLoginScreen();
}

function enterApp() {
  // Save session so refresh doesn't log out
  try { sessionStorage.setItem('mc_session', JSON.stringify(currentUser)); } catch(e) {}
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

}

function getGreeting() {

function renderEmployeeRows(users) {
  if (!users.length) return `<tr><td colspan="10" class="empty">No employees yet. Add your first employee!</td></tr>`;
  return users.map((u,i)=>`<tr>
    <td style="color:var(--muted);">${i+1}</td>
    <td><div style="display:flex;align-items:center;gap:8px;">
      <div class="user-avatar" style="width:28px;height:28px;font-size:11px;">${u.name.charAt(0)}</div>
      <span class="highlight">${u.name}</span>
    </div></td>
    <td><span class="badge badge-blue">${u.role||'—'}</span></td>
    <td style="font-family:monospace;color:var(--muted);font-size:11px;">${u.loginId||'—'}</td>
    <td style="color:var(--muted);">${u.phone||'—'}</td>
    <td style="font-size:11px;color:var(--sub);">${u.siteName||'—'}</td>
    <td class="amount-positive">${fmt(u.salary||0)}</td>
    <td style="color:var(--muted);font-size:11px;">${u.joiningDate||'—'}</td>
    <td><span class="badge ${u.status==='active'?'badge-green':'badge-red'}">${u.status}</span></td>
    <td style="white-space:nowrap;">
      <button class="btn btn-ghost btn-xs" onclick="modalEditEmployee('${u.id}')">✏️</button>
      <button class="btn btn-ghost btn-xs" style="margin-left:3px;" onclick="toggleUser('${u.id}')">${u.status==='active'?'🔒':'🔓'}</button>
      <button class="btn btn-danger btn-xs" style="margin-left:3px;" onclick="deleteEmployee('${u.id}')">🗑️</button>
    </td>
  </tr>`).join('');
}

function filterEmployees(q) {
  const users = getCompanyUsers().filter(u => u.name.toLowerCase().includes(q.toLowerCase())||u.role?.toLowerCase().includes(q.toLowerCase())||(u.siteName||'').toLowerCase().includes(q.toLowerCase()));
  document.getElementById('emp-tbody').innerHTML = renderEmployeeRows(users);
}
function filterEmployeesByRole(role) {
  const users = role ? getCompanyUsers().filter(u=>u.role===role) : getCompanyUsers();
  document.getElementById('emp-tbody').innerHTML = renderEmployeeRows(users);
}

function addEmployee() {
  const name = g('e-name').value.trim();
  const role = g('e-role').value;
  const loginId = g('e-lid').value.trim();
  const password = g('e-pass').value;
  const phone = g('e-phone').value.trim();
  const salary = parseInt(g('e-salary').value)||0;
  const siteId = g('e-site').value;
  const joiningDate = g('e-join').value;
  const access = [...document.querySelectorAll('.e-access:checked')].map(c=>c.value);
  if (!name||!loginId||!password||!phone) return toast('Fill required fields','error');
  if (DB.users.find(u=>u.loginId===loginId)) return toast('Login ID already exists','error');
  const site = DB.sites.find(s=>s.id===siteId);
  DB.users.push({
    id:'u_'+uid(), companyId:currentUser.companyId, name, role, loginId, password, phone, salary, siteId, siteName:site?.name||'', joiningDate, access, status:'active'
  });
  saveDB(); closeModal(); toast('Employee added!'); renderPage('employees');
}

function modalEditEmployee(id) {
  const u = DB.users.find(x=>x.id===id);

  const sites = getCompanySites();

    </div>
  `);
}

function saveEditEmployee(id) {
  const u = DB.users.find(x=>x.id===id);
  if (!u) return;
  u.name = g('ee-name').value.trim()||u.name;
  u.role = g('ee-role').value;
  u.phone = g('ee-phone').value.trim();
  u.salary = parseInt(g('ee-salary').value)||u.salary;
  const siteId = g('ee-site').value;
  u.siteId = siteId;
  u.siteName = DB.sites.find(s=>s.id===siteId)?.name||'';
  const np = g('ee-pass').value;
  if (np) u.password = np;
  saveDB(); closeModal(); toast('Employee updated!'); renderPage('employees');
}

function toggleUser(id) {
  const u = DB.users.find(x=>x.id===id);
  if (u) { u.status = u.status==='active'?'inactive':'active'; saveDB(); toast('Status updated'); renderPage('employees'); }
}
function deleteEmployee(id) {
  if (!confirm('Delete this employee?')) return;
  DB.users = DB.users.filter(u=>u.id!==id);
  saveDB(); toast('Employee deleted'); renderPage('employees');
}

function saveEditSite(id) {
  const s = DB.sites.find(x=>x.id===id);
  if (!s) return;
  s.name = g('se-name').value.trim()||s.name;
  s.address = g('se-addr').value.trim();
  s.client = g('se-client').value.trim();
  s.totalBill = parseInt(g('se-bill').value)||s.totalBill;
  s.status = g('se-status').value;
  s.startDate = g('se-start').value;
  s.endDate = g('se-end').value;
  saveDB(); closeModal(); toast('Site updated!'); renderPage('sites');
}

function deleteSite(id) {
  if (!confirm('Delete this site?')) return;
  DB.sites = DB.sites.filter(s=>s.id!==id);
  saveDB(); toast('Site deleted'); renderPage('sites');
}

function pageAttendance() {
  const users = getCompanyUsers();
  const sites = getCompanySites();
  const todayStr = today();
  return `
  <div class="page-header">
    <div><div class="page-title">✅ Attendance Register</div><div class="page-sub">Mark and view employee attendance by site and date</div></div>
    <button class="btn btn-primary" onclick="exportAttendance()">📥 Export CSV</button>
  </div>
  <div class="grid-4" style="margin-bottom:20px;" id="att-stats">
    ${renderAttStats(todayStr)}
  </div>
  <div class="card">
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end;">
      <div><label class="label">Date</label><input class="input" type="date" id="att-date" value="${todayStr}" style="width:160px;" oninput="reloadAttendance()"/></div>
      <div><label class="label">Site</label>
        <select class="input" id="att-site" style="width:200px;" onchange="reloadAttendance()">
          <option value="">All Sites</option>
          ${sites.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
      </div>
      <button class="btn btn-ghost" onclick="markAllPresent()">✅ Mark All Present</button>
    </div>
    <div class="table-wrap"><table class="tbl">
      <thead><tr><th>Employee</th><th>Role</th><th>Site</th><th>Login</th><th>Logout</th><th>Status</th><th>Total Days</th><th>Selfie</th><th>Mark</th></tr></thead>
      <tbody id="att-tbody">${renderAttRows(users, todayStr, '')}</tbody>
    </table></div>
  </div>`;
}

function renderAttStats(dateStr) {
  const attRecords = DB.attendance.filter(a=>a.companyId===currentUser.companyId && a.date===dateStr);
  const total = getCompanyUsers().length;
  const present = attRecords.filter(a=>a.status==='present').length;
  const absent = attRecords.filter(a=>a.status==='absent').length;
  const onLeave = attRecords.filter(a=>a.status==='leave').length;
  const notMarked = total - attRecords.length;
  return [
    statCard('✅','Present', present,'var(--green)',''),
    statCard('❌','Absent', absent,'var(--red)',''),
    statCard('🏖️','On Leave', onLeave,'var(--yellow)',''),
    statCard('⏳','Not Marked', notMarked,'var(--muted)',''),
  ].join('');
}

function reloadAttendance() {
  const dateStr = g('att-date').value;
  const siteId = g('att-site').value;
  let users = getCompanyUsers();
  if (siteId) users = users.filter(u=>u.siteId===siteId);
  document.getElementById('att-tbody').innerHTML = renderAttRows(users, dateStr, siteId);
  document.getElementById('att-stats').innerHTML = renderAttStats(dateStr);
}

function renderAttRows(users, dateStr, siteId) {
  if (!users.length) return `<tr><td colspan="9" class="empty">No employees found.</td></tr>`;
  return users.map(u=>{
    const att = DB.attendance.find(a=>a.userId===u.id && a.date===dateStr);
    const totalDays = DB.attendance.filter(a=>a.userId===u.id && a.status==='present').length;
    return `<tr>
      <td class="highlight">${u.name}</td>
      <td><span class="badge badge-blue" style="font-size:9px;">${u.role||'—'}</span></td>
      <td style="font-size:11px;color:var(--muted);">${u.siteName||'—'}</td>
      <td style="color:var(--muted);">${att?.loginTime||'—'}</td>
      <td style="color:var(--muted);">${att?.logoutTime||'—'}</td>
      <td><span class="badge ${!att?'badge-gray':att.status==='present'?'badge-green':att.status==='leave'?'badge-yellow':'badge-red'}">${att?.status||'—'}</span></td>
      <td style="color:var(--accent);font-weight:700;">${totalDays} days</td>
      <td>${att?.selfie?`<img src="${att.selfie}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;cursor:pointer;" onclick="viewSelfie('${att.id}')"/>`:'—'}</td>
      <td style="white-space:nowrap;">
        <button onclick="markAtt('${u.id}','${dateStr}','present')" style="background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);color:#4caf50;padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;">P</button>
        <button onclick="markAtt('${u.id}','${dateStr}','absent')" style="background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);color:var(--red);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;">A</button>
        <button onclick="markAtt('${u.id}','${dateStr}','leave')" style="background:rgba(255,193,7,.15);border:1px solid rgba(255,193,7,.3);color:var(--yellow);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;">L</button>
        <button onclick="markAtt('${u.id}','${dateStr}','half-day')" style="background:rgba(255,167,51,.15);border:1px solid rgba(255,167,51,.3);color:var(--orange);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;">H</button>
      </td>
    </tr>`;
  }).join('');
}

function markAtt(userId, dateStr, status) {
  const user = getUserById(userId);
  const existing = DB.attendance.find(a=>a.userId===userId && a.date===dateStr);
  const timeStr = new Date().toTimeString().slice(0,5);
  if (existing) {
    existing.status = status;
    if (status==='present' && !existing.loginTime) existing.loginTime = timeStr;
  } else {
    DB.attendance.push({ id:'att_'+uid(), companyId:currentUser.companyId, userId, siteId:user?.siteId||'', date:dateStr, status, loginTime:status==='present'?timeStr:null, logoutTime:null, selfie:null, lat:null, lng:null });
  }
  saveDB(); reloadAttendance(); toast(`Marked ${status}`,'info');
}

function markAllPresent() {
  const dateStr = g('att-date').value;
  const users = getCompanyUsers();
  const timeStr = new Date().toTimeString().slice(0,5);
  users.forEach(u=>{
    const existing = DB.attendance.find(a=>a.userId===u.id && a.date===dateStr);
    if (!existing) DB.attendance.push({ id:'att_'+uid(), companyId:currentUser.companyId, userId:u.id, siteId:u.siteId||'', date:dateStr, status:'present', loginTime:timeStr, logoutTime:null, selfie:null, lat:null, lng:null });
    else if (existing.status!=='present') existing.status = 'present';
  });
  saveDB(); reloadAttendance(); toast('All marked present!');
}

function viewSelfie(attId) {
  const att = DB.attendance.find(a=>a.id===attId);
  if (!att?.selfie) return;
  openModal(`<h3>📸 Attendance Selfie</h3><img src="${att.selfie}" style="width:100%;border-radius:12px;" /><div style="font-size:12px;color:var(--muted);margin-top:10px;">Date: ${att.date} · Time: ${att.loginTime}</div>`);
}

function exportAttendance() {
  const users = getCompanyUsers();
  let csv = 'Employee,Role,Site,Date,Login,Logout,Status,Total Days\n';
  users.forEach(u=>{
    DB.attendance.filter(a=>a.userId===u.id).forEach(a=>{
      const total = DB.attendance.filter(x=>x.userId===u.id&&x.status==='present').length;
      csv += `"${u.name}","${u.role||''}","${u.siteName||''}","${a.date}","${a.loginTime||''}","${a.logoutTime||''}","${a.status}","${total}"\n`;
    });
  });
  downloadCSV(csv, 'attendance.csv');
}

function downloadCSV(csv, filename) {
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = filename;
  a.click();
  toast('Downloaded!');
}

function modalAddTask() {

    <div class="form-group"><label class="label">Description</label><textarea class="input" id="t-desc" placeholder="Task details..."></textarea></div>
    <div class="grid-2">
      <div class="form-group"><label class="label">Assign To *</label>
        <select class="input" id="t-to"><option value="">Select employee</option>${users.map(u=>`<option value="${u.id}">${u.name} (${u.role||''})</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="label">Site</label>
        <select class="input" id="t-site"><option value="">No specific site</option>${sites.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>

    <div class="grid-2">
      <div class="form-group"><label class="label">Priority</label>
        <select class="input" id="t-pri"><option>urgent</option><option>high</option><option selected>medium</option><option>low</option></select>
      </div>
      <div class="form-group"><label class="label">Due Date *</label><input class="input" type="date" id="t-due" value="${today()}"/></div>

function addTask() {
  const title = g('t-title').value.trim();
  const assignedTo = g('t-to').value;
  const dueDate = g('t-due').value;
  if (!title||!assignedTo||!dueDate) return toast('Fill required fields','error');
  DB.tasks.push({
    id:'t_'+uid(), companyId:currentUser.companyId, assignedTo, assignedBy:currentUser.id,
    siteId:g('t-site').value, title, description:g('t-desc').value.trim(),
    priority:g('t-pri').value, status:'pending', dueDate, createdAt:today()
  });
  saveDB(); closeModal(); toast('Task assigned!'); renderPage('tasks');
}

function updateTaskStatus(id, status) {
  const t = DB.tasks.find(x=>x.id===id);
  if (t) { t.status = status; saveDB(); toast('Updated','info'); renderPage('tasks'); }
}
function deleteTask(id) {
  if (!confirm('Delete task?')) return;
  DB.tasks = DB.tasks.filter(t=>t.id!==id);
  saveDB(); toast('Deleted'); renderPage('tasks');
}

              <td><span class="badge ${l.status==='approved'?'badge-green':l.status==='denied'?'badge-red':'badge-yellow'}">${l.status}</span></td>
              <td style="white-space:nowrap;">
                ${l.status==='pending'?`
                  <button class="btn btn-success btn-xs" onclick="updateLeave('${l.id}','approved')">✓ Approve</button>
                  <button class="btn btn-danger btn-xs" style="margin-left:4px;" onclick="updateLeave('${l.id}','denied')">✗ Deny</button>
                `:'—'}
              </td>
            </tr>`;
          }).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function updateLeave(id, status) {
  const l = DB.leaves.find(x=>x.id===id);
  if (l) {
    l.status = status;
    l.approvedBy = currentUser.id;
    l.approvedAt = today();
    // If approved, mark leave in attendance for those dates
    if (status === 'approved') {
      const user = getUserById(l.userId);
      let d = new Date(l.from);
      const end = new Date(l.to);
      while (d <= end) {
        const dateStr = d.toISOString().split('T')[0];
        if (!DB.attendance.find(a=>a.userId===l.userId && a.date===dateStr)) {
          DB.attendance.push({ id:'att_'+uid(), companyId:currentUser.companyId, userId:l.userId, siteId:user?.siteId||'', date:dateStr, status:'leave', loginTime:null, logoutTime:null, selfie:null, lat:null, lng:null });
        }
        d.setDate(d.getDate()+1);
      }
    }
    saveDB(); toast(`Leave ${status}`); renderPage('leaves'); setupSidebar();
  }
}

function getMonthOptions() {
  const opts = [];
  const d = new Date();
  for (let i=0;i<12;i++) {
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0');
    const val = `${y}-${m}`;
    opts.push(`<option value="${val}" ${i===0?'selected':''}>${new Date(y,d.getMonth(),1).toLocaleString('default',{month:'long',year:'numeric'})}</option>`);
    d.setMonth(d.getMonth()-1);
  }
  return opts.join('');
}

function reloadSalary() {
  document.getElementById('sal-stats').innerHTML = renderSalStats();
  document.getElementById('sal-tbody').innerHTML = renderSalaryRows();
}

function renderSalStats() {
  const month = document.getElementById('sal-month')?.value || new Date().toISOString().slice(0,7);
  const users = getCompanyUsers();
  let totalPayable=0, totalPaid=0;
  users.forEach(u=>{
    const s = calcSal(u.id, month);
    totalPayable += s.net;
    if (s.paid) totalPaid += s.net;
  });
  return statCard('💰','Total Payable',fmt(totalPayable),'var(--accent)','') +
    statCard('✅','Total Paid',fmt(totalPaid),'var(--teal)','') +
    statCard('⏳','Pending',fmt(totalPayable-totalPaid),'var(--red)','');
}

function calcSal(userId, month) {
  const u = getUserById(userId);
  if (!u) return { net:0, paid:false, daysWorked:0, daysInMonth:26, earned:0, advance:0, deductions:0 };
  const existing = DB.salaries.find(s=>s.userId===userId && s.month===month);
  const daysInMonth = 26;
  const daysWorked = DB.attendance.filter(a=>a.userId===userId && a.date?.startsWith(month) && a.status==='present').length +
    DB.attendance.filter(a=>a.userId===userId && a.date?.startsWith(month) && a.status==='half-day').length * 0.5;
  const advance = existing?.advance || 0;
  const deductions = existing?.deductions || 0;
  const earned = Math.round(((u.salary||0)/daysInMonth)*daysWorked);
  const net = Math.max(0, earned - advance - deductions);
  return { daysWorked, daysInMonth, earned, advance, deductions, net, paid: existing?.paid||false, paidDate: existing?.paidDate||null, basicSalary: u.salary||0 };
}

function renderSalaryRows() {
  const month = document.getElementById('sal-month')?.value || new Date().toISOString().slice(0,7);
  const users = getCompanyUsers();
  if (!users.length) return `<tr><td colspan="10" class="empty">No employees yet.</td></tr>`;
  return users.map(u=>{
    const s = calcSal(u.id, month);
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px;"><div class="user-avatar" style="width:26px;height:26px;font-size:10px;">${u.name.charAt(0)}</div><div><div class="highlight">${u.name}</div><div style="font-size:10px;color:var(--muted);">${u.role||''}</div></div></div></td>
      <td>${fmt(s.basicSalary)}</td>
      <td>${s.daysInMonth}</td>
      <td style="color:var(--accent);font-weight:700;">${s.daysWorked}</td>
      <td>${fmt(s.earned)}</td>
      <td style="color:${s.advance>0?'var(--red)':'var(--muted)'};">${s.advance>0?'-'+fmt(s.advance):'—'}</td>
      <td style="color:${s.deductions>0?'var(--red)':'var(--muted)'};">${s.deductions>0?'-'+fmt(s.deductions):'—'}</td>
      <td class="amount-positive" style="font-size:15px;">${fmt(s.net)}</td>
      <td><span class="badge ${s.paid?'badge-green':'badge-yellow'}">${s.paid?'Paid '+s.paidDate:'Pending'}</span></td>
      <td style="white-space:nowrap;">
        ${!s.paid?`<button class="btn btn-success btn-xs" onclick="markSalaryPaid('${u.id}','${month}')">Mark Paid</button>`:''}

    </tr>`;
  }).join('');
}

function markSalaryPaid(userId, month) {
  const existing = DB.salaries.find(s=>s.userId===userId && s.month===month);

function renderPnLContent(siteId) {

  const expCats = ['Material','Staff Salary','Traveling','Admin Cost','Misc Expenses'];
  const expenses = DB.expenses.filter(e=>e.siteId===siteId);
  const expByCategory = expCats.map(cat=>({ cat, total: expenses.filter(e=>e.category===cat).reduce((a,e)=>a+(e.amount||0),0) }));

  const received = DB.payments.filter(p=>p.siteId===siteId).reduce((a,p)=>a+(p.amount||0),0);
  const profit = (site.totalBill||0) - totalExp;
  const balance = received - totalExp;

  return `
  <div class="grid-2" style="margin-bottom:20px;">
    <div class="card" style="border:1px solid ${profit>=0?'rgba(78,205,196,.3)':'rgba(255,107,107,.3)'};">

        </div>
        ${expByCategory.filter(e=>e.total>0).map(e=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0 6px 16px;border-bottom:1px solid #1a1d2e;">
            <span style="color:var(--muted);font-size:12px;">(-) ${e.cat}</span>
            <span style="color:var(--red);font-size:12px;">(${fmt(e.total)})</span>
          </div>
        `).join('')}
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid var(--accent);">
          <span style="color:var(--text);font-weight:700;font-size:15px;">= Net Profit / Loss</span>
          <span style="color:${profit>=0?'var(--teal)':'var(--red)'};font-weight:800;font-size:20px;">${profit>=0?'+':''}${fmt(profit)}</span>
        </div>
      </div>
    </div>
    <div class="card">
      <h4 style="color:var(--text);margin-bottom:16px;font-size:15px;">💰 Financial Summary</h4>
      ${[
        {label:'Contract Value',val:fmt(site.totalBill||0),color:'var(--accent)'},
        {label:'Total Received',val:fmt(received),color:'var(--teal)'},
        {label:'Total Expenses',val:fmt(totalExp),color:'var(--orange)'},
        {label:'Cash Balance (Rcvd-Exp)',val:fmt(balance),color:balance>=0?'var(--teal)':'var(--red)'},
        {label:'Balance to Receive',val:fmt((site.totalBill||0)-received),color:'var(--yellow)'},
      ].map(r=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #1a1d2e;">
        <span style="font-size:12px;color:var(--muted);">${r.label}</span>
        <span style="font-size:13px;font-weight:700;color:${r.color};">${r.val}</span>
      </div>`).join('')}
      <div style="margin-top:14px;">
        <div style="font-size:10px;color:var(--muted);margin-bottom:5px;">Expense Breakdown</div>
        ${expByCategory.map(e=>`
          <div style="margin-bottom:8px;">
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px;"><span>${e.cat}</span><span>${totalExp?Math.round(e.total/totalExp*100):0}%</span></div>
            <div class="progress"><div class="progress-bar" style="width:${totalExp?e.total/totalExp*100:0}%;"></div></div>
          </div>
        `).join('')}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">

      <tbody>
        ${expenses.length===0?`<tr><td colspan="5" class="empty">No expenses added yet.</td></tr>`:
          expenses.sort((a,b)=>b.date?.localeCompare(a.date||'')).map(e=>`<tr>
            <td style="color:var(--muted);">${e.date}</td>
            <td><span class="badge ${e.category==='Material'?'badge-blue':e.category==='Staff Salary'?'badge-purple':e.category==='Traveling'?'badge-teal':'badge-orange'}">${e.category}</span></td>

function previewDoc(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('doc-preview');
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.style.display = 'block';
      preview.innerHTML = `<img src="${e.target.result}" style="max-width:100%;border-radius:8px;max-height:150px;object-fit:cover;"/>`;
    };
    reader.readAsDataURL(file);
  } else {
    preview.style.display = 'block';
    preview.innerHTML = `<div style="padding:10px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--teal);">📄 ${file.name} (${(file.size/1024).toFixed(1)} KB)</div>`;
  }
}

function addDocument() {
  const title = g('doc-title').value.trim();
  if (!title) return toast('Enter title','error');
  const fileInput = g('doc-file');
  const file = fileInput.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      DB.documents.push({ id:'doc_'+uid(), companyId:currentUser.companyId, siteId:g('doc-site').value, title, type:g('doc-type').value, date:g('doc-date').value, notes:g('doc-notes').value.trim(), fileData:e.target.result, fileName:file.name });
      saveDB(); closeModal(); toast('Document saved!'); renderPage('documents');
    };
    reader.readAsDataURL(file);
  } else {
    DB.documents.push({ id:'doc_'+uid(), companyId:currentUser.companyId, siteId:g('doc-site').value, title, type:g('doc-type').value, date:g('doc-date').value, notes:g('doc-notes').value.trim(), fileData:null, fileName:null });
    saveDB(); closeModal(); toast('Document saved (no file)!'); renderPage('documents');
  }
}

function viewDocument(id) {
  const d = DB.documents.find(x=>x.id===id);
  if (!d?.fileData) return;
  if (d.fileData.startsWith('data:image')) {
    openModal(`<h3>📷 ${d.title}</h3><img src="${d.fileData}" style="width:100%;border-radius:10px;"/>`);
  } else {
    const a = document.createElement('a');
    a.href = d.fileData; a.download = d.fileName||'document.pdf'; a.click();
  }
}

function deleteDocument(id) {
  if (!confirm('Delete?')) return;
  DB.documents = DB.documents.filter(d=>d.id!==id);
  saveDB(); renderPage('documents');
}

function pageReports() {

  const totalPayments = DB.payments.filter(p=>p.companyId===currentUser.companyId).reduce((a,p)=>a+p.amount,0);
  const totalExpenses = DB.expenses.filter(e=>e.companyId===currentUser.companyId).reduce((a,e)=>a+e.amount,0);

  return `
  <div class="page-header">
    <div><div class="page-title">📊 Reports & Analytics</div><div class="page-sub">Company-wide reports and insights</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="exportFullReport()">📥 Export Full Report</button>

  </div>
  <div class="grid-4" style="margin-bottom:22px;">
    ${statCard('✅','Attendance Rate',totalPresent+' days','var(--green)','This month')}

    ${statCard('💰','Total Collected',fmt(totalPayments),'var(--teal)','All time')}
    ${statCard('📉','Total Expenses',fmt(totalExpenses),'var(--orange)','All time')}
  </div>
  <div class="grid-2">
    <div class="card">
      <h4 style="color:var(--text);margin-bottom:14px;">Employee Attendance Summary</h4>

        <tbody>
          ${users.map(u=>{
            const att = DB.attendance.filter(a=>a.userId===u.id);
            const present = att.filter(a=>a.status==='present').length;
            const absent = att.filter(a=>a.status==='absent').length;
            const leave = att.filter(a=>a.status==='leave').length;
            const total = att.length;
            const pct = total ? Math.round(present/total*100) : 0;
            return `<tr>
              <td class="highlight">${u.name}</td>
              <td style="color:var(--teal);">${present}</td>
              <td style="color:var(--red);">${absent}</td>

              <td><span class="badge ${pct>=80?'badge-green':pct>=60?'badge-yellow':'badge-red'}">${pct}%</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>
    <div class="card">
      <h4 style="color:var(--text);margin-bottom:14px;">Site P&L Summary</h4>
      <div class="table-wrap"><table class="tbl">
        <thead><tr><th>Site</th><th>Contract</th><th>Received</th><th>Expenses</th><th>P&L</th></tr></thead>
        <tbody>
          ${sites.map(s=>{
            const recv = DB.payments.filter(p=>p.siteId===s.id).reduce((a,p)=>a+p.amount,0);
            const exp = DB.expenses.filter(e=>e.siteId===s.id).reduce((a,e)=>a+e.amount,0);
            const pnl = (s.totalBill||0) - exp;
            return `<tr>
              <td class="highlight">${s.name}</td>
              <td>${fmt(s.totalBill||0)}</td>
              <td style="color:var(--teal);">${fmt(recv)}</td>

              <td style="color:${pnl>=0?'var(--teal)':'var(--red)'};font-weight:700;">${pnl>=0?'+':''}${fmt(pnl)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>
  </div>`;
}

function exportFullReport() {
  const users = getCompanyUsers();
  const sites = getCompanySites();
  let csv = 'MyCompany - Full Report\n\n';
  csv += 'ATTENDANCE REPORT\n';
  csv += 'Employee,Total Present,Total Absent,Total Leave\n';
  users.forEach(u=>{
    const att = DB.attendance.filter(a=>a.userId===u.id);
    csv += `"${u.name}","${att.filter(a=>a.status==='present').length}","${att.filter(a=>a.status==='absent').length}","${att.filter(a=>a.status==='leave').length}"\n`;
  });
  csv += '\nSITE P&L REPORT\n';
  csv += 'Site,Contract Value,Received,Expenses,Profit\n';
  sites.forEach(s=>{
    const recv = DB.payments.filter(p=>p.siteId===s.id).reduce((a,p)=>a+p.amount,0);
    const exp = DB.expenses.filter(e=>e.siteId===s.id).reduce((a,e)=>a+e.amount,0);
    csv += `"${s.name}","${s.totalBill||0}","${recv}","${exp}","${(s.totalBill||0)-exp}"\n`;
  });
  downloadCSV(csv, 'workforce_report.csv');
}

}

function sendWAMsg(type) {
  let msg = '';
  if (type==='reminder') {
    const reminders = DB.reminders.filter(r=>r.companyId===currentUser.companyId && r.status==='pending');
    msg = `🔔 *MyCompany - Pending Reminders*\n\n${reminders.map(r=>`• ${r.type}: ${r.message} (Due: ${r.dueDate})`).join('\n')}`;
  } else if (type==='salary') {
    const company = DB.companies.find(c=>c.id===currentUser.companyId);
    msg = `💰 *${company?.name} - Salary Update*\n\nSalaries for the month will be processed soon. Please check your salary details on MyCompany.`;
  } else if (type==='attendance') {
    msg = `✅ *MyCompany - Attendance Reminder*\n\nPlease mark your attendance for today. Login to MyCompany app to check in.`;
  }
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  closeModal();
}

    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div style="font-size:26px;font-weight:800;color:${color};">${value}</div>
        <div style="font-size:12px;color:var(--sub);font-weight:500;margin-top:3px;">${label}</div>
        ${sub?`<div style="font-size:10px;color:var(--muted);margin-top:2px;">${sub}</div>`:''}
      </div>
      <span style="font-size:22px;">${icon}</span>
    </div>
  </div>`;
}

// ============================================================
// MOBILE NAVIGATION
// ============================================================
function mobileNav(page) {
  toggleMobMore(true);
  document.querySelectorAll('.mob-nav-item').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('mob-nav-' + page);
  if(btn) btn.classList.add('active');
  navigateTo(page);
}

function toggleMobMore(forceClose) {
  const menu = document.getElementById('mob-more-menu');
  if (!menu) return;
  if (forceClose === true || menu.classList.contains('open')) {
    menu.classList.remove('open');
  } else {
    menu.classList.add('open');
  }
}

function buildMobileMoreMenu() {
  const grid = document.getElementById('mob-more-grid');
  if (!grid) return;
  const role = currentUser?.role;
  const allItems = [
    { icon:'👥', label:'Employees', page:'employees', roles:['admin','superadmin'] },
    { icon:'🏗️', label:'Sites', page:'sites', roles:['admin','superadmin'] },
    { icon:'📍', label:'Live Track', page:'tracking', roles:['admin','superadmin'] },
    { icon:'💰', label:'Salary', page:'salary', roles:['admin','superadmin'] },
    { icon:'📊', label:'P&L', page:'pnl', roles:['admin','superadmin'] },
    { icon:'💳', label:'Payments', page:'payments', roles:['admin','superadmin'] },
    { icon:'🔔', label:'Reminders', page:'reminders', roles:['admin','superadmin'] },
    { icon:'📦', label:'Materials', page:'materials', roles:['admin','superadmin'] },
    { icon:'📁', label:'Documents', page:'documents', roles:['admin','superadmin'] },
    { icon:'📈', label:'Reports', page:'reports', roles:['admin','superadmin'] },
    { icon:'🏢', label:'Companies', page:'companies', roles:['superadmin'] },
    { icon:'💳', label:'Plans', page:'subscriptions', roles:['superadmin'] },
    { icon:'💰', label:'My Salary', page:'my-salary', roles:['user'] },
    { icon:'📍', label:'My Attend', page:'qr-attend', roles:['user'] },
    { icon:'🚪', label:'Logout', page:'logout', roles:['admin','superadmin','user'] },
  ];
  const filtered = allItems.filter(i => i.roles.includes(role));
  grid.innerHTML = filtered.map(i =>
    `<div class="mob-nav-grid-item" onclick="${i.page==='logout'?'logout()':'mobileNav(\'' + i.page + '\')'}">`
    + `<span class="mgi-icon">${i.icon}</span><span class="mgi-label">${i.label}</span></div>`
  ).join('');
}

function updateMobileTopbar() {
  const avatar = document.getElementById('mob-avatar');
  const roleLabel = document.getElementById('mob-role-label');
  if (!currentUser) return;
  let initial = '?', roleText = currentUser.role;
  if (currentUser.role === 'superadmin') { initial = 'SA'; roleText = 'Super Admin'; }
  else if (currentUser.role === 'admin') {
    const a = DB.admins.find(x=>x.id===currentUser.id);
    initial = a?.name?.charAt(0)?.toUpperCase() || 'A'; roleText = 'Admin';
  } else {
    const u = DB.users.find(x=>x.id===currentUser.id);
    initial = u?.name?.charAt(0)?.toUpperCase() || 'U'; roleText = 'Employee';
  }
  if(avatar) avatar.textContent = initial;
  if(roleLabel) roleLabel.textContent = roleText;
}

// INIT

window.onload = async function() {
  // Show loading screen while DB loads
  document.getElementById('login-screen').innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:54px;margin-bottom:16px;">🏗️</div>
      <h1 style="font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">MyCompany</h1>
      <p style="color:var(--muted);font-size:13px;margin-top:8px;">Loading your workspace...</p>
      <div style="margin-top:24px;width:200px;margin-left:auto;margin-right:auto;">
        <div class="progress"><div class="progress-bar" style="width:100%;animation:pulse 1.5s infinite;"></div></div>
      </div>
    </div>
  `;
  document.getElementById('login-screen').style.display = 'flex';

  await loadDB();
  DB.superAdmin = { id:'sa1', username:'justclickfms@gmail.com', password:'workdo' };

  // Restore session from sessionStorage (survives refresh, cleared on tab close)
  try {
    const savedSession = sessionStorage.getItem('mc_session');
    if (savedSession) {
      const session = JSON.parse(savedSession);
      // Validate session is still valid
      let valid = false;
      if (session.role === 'superadmin') {
        valid = true;
      } else if (session.role === 'admin') {
        valid = !!DB.admins.find(a => a.id === session.id);
      } else if (session.role === 'user') {
        valid = !!DB.users.find(u => u.id === session.id && u.status === 'active');
      }
      if (valid) {
        currentUser = session;
        enterApp();
        toast('Welcome back!', 'info');
        return;
      } else {
        sessionStorage.removeItem('mc_session');
      }
    }
  } catch(e) {}

  // No valid session — show login screen properly
  showLoginScreen();
};
